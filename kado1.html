<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kado Pertama</title>
    <style>
      canvas {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>
  <body>
    <canvas id="cake"></canvas>
    <script>
      window.requestAnimationFrame =
        window.__requestAnimationFrame ||
        window.requestAnimationFrame ||
        window.webkitRequestAnimationFrame ||
        window.mozRequestAnimationFrame ||
        window.oRequestAnimationFrame ||
        window.msRequestAnimationFrame ||
        (function () {
          return function (callback, element) {
            var lastTime = element.__lastTime || 0;
            var currTime = Date.now();
            var timeToCall = Math.max(1, 33 - (currTime - lastTime));
            window.setTimeout(callback, timeToCall);
            element.__lastTime = currTime + timeToCall;
          };
        })();

      var loaded = false;

      var init = function () {
        if (loaded) return;
        loaded = true;
        var canvas = document.getElementById("cake");
        var ctx = canvas.getContext("2d");
        var width = (canvas.width = window.innerWidth);
        var height = (canvas.height = window.innerHeight);

        var cakeImg = new Image();
        cakeImg.src = "foto/pandaj.png"; // Path gambar lokal

        cakeImg.onload = function () {
          var cakeWidth = cakeImg.width;
          var cakeHeight = cakeImg.height;
          var cakeX = (width - cakeWidth) / 2; // Posisi gambar agar berada di tengah
          var cakeY = (height - cakeHeight) / 2;

          var angle = 0;
          var scale = 1;

          var pulse = function () {
            // Efek animasi
            var scaleFactor = Math.sin(Date.now() / 1000) * 0.3 + 1; // Perubahan ukuran
            var rotateFactor = Math.sin(Date.now() / 2000) * 0.1; // Rotasi gambar
            var colorFactor = Math.abs(Math.sin(Date.now() / 1000)); // Perubahan warna

            angle += rotateFactor;
            scale = scaleFactor;

            var r = Math.floor(255 * colorFactor);
            var g = Math.floor(255 * (1 - colorFactor));
            var b = Math.floor(255 * Math.abs(Math.sin(Date.now() / 500))); // Variasi warna biru-merah

            ctx.clearRect(0, 0, width, height); // Menghapus frame sebelumnya

            // Mengatur warna background
            ctx.fillStyle = `rgb(${r}, ${g}, 255)`;
            ctx.fillRect(0, 0, width, height);

            // Gambar kue dengan rotasi dan skala
            ctx.save();
            ctx.translate(cakeX + cakeWidth / 2, cakeY + cakeHeight / 2); // Memindahkan titik pusat
            ctx.rotate(angle); // Rotasi gambar
            ctx.scale(scale, scale); // Skala gambar
            ctx.drawImage(cakeImg, -cakeWidth / 2, -cakeHeight / 2); // Gambar di tengah
            ctx.restore();

            window.requestAnimationFrame(pulse, canvas); // Loop animasi
          };

          pulse();
        };
      };

      var s = document.readyState;
      if (s === "complete" || s === "loaded" || s === "interactive") init();
      else document.addEventListener("DOMContentLoaded", init);
    </script>
  </body>
</html>
