<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kartu Ulang Tahun</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Pacifico', cursive;
      background-color: #cce3f7;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .background-pattern {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('foto/bghias.png');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }

    .background-decor {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 2; /* Menyesuaikan agar dekor di atas background */
    }

    .decor-item {
      position: absolute;
      width: 80px;
      opacity: 0.8;
      animation: floatDecor 4s ease-in-out infinite alternate;
      cursor: pointer;
    }

    @keyframes floatDecor {
      0% { transform: translateY(0); }
      100% { transform: translateY(20px); }
    }

    .decor-item:nth-child(1) { bottom: 5%; left: 10%; }
    .decor-item:nth-child(2) { bottom: 7%; right: 15%; }
    .decor-item:nth-child(3) { bottom: 3%; left: 30%; }
    .decor-item:nth-child(4) { bottom: 8%; right: 30%; }

    .balloon-container {
      position: absolute;
      top: 20px;
      display: flex;
      justify-content: center;
      gap: 20px;
      width: 100%;
      z-index: 3;
    }

    .balloon {
      width: 50px;
      position: relative;
      cursor: pointer;
      opacity: 1;
      transition: transform 0.3s ease, opacity 0.3s ease;
      animation: blink 2s infinite ease-in-out alternate;
    }

    .balloon img {
      width: 100%;
      display: block;
    }

    .balloon:nth-child(1) { filter: hue-rotate(0deg); animation-delay: 0s; }
    .balloon:nth-child(2) { filter: hue-rotate(60deg); animation-delay: 0.3s; }
    .balloon:nth-child(3) { filter: hue-rotate(120deg); animation-delay: 0.6s; }
    .balloon:nth-child(4) { filter: hue-rotate(180deg); animation-delay: 0.9s; }

    @keyframes blink {
      0% { transform: scale(1); }
      100% { transform: scale(1.3); }
    }

    .balloon-text {
      position: absolute;
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 0.9em;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
      opacity: 0;
      transition: opacity 0.3s ease;
      cursor: pointer;
    }

    .balloon-text.show {
      opacity: 1;
    }

    .card {
      text-align: center;
      background: #fff8ec;
      padding: 20px;
      border-radius: 30px 50px 30px 50px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.2);
      max-width: 90%;
      width: 350px;
      z-index: 4;
    }

    .card h1 {
      font-size: 20px;
      margin: 0;
      background: linear-gradient(to right, #7ec8e3, #cfa7e8, #f7c1e3); /* warna baru */
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      margin: 10px 0;
      font-size: 12.5px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .description {
      font-size: 12.5px;
      color: #555;
      margin: 10px 0;
    }

    .characters img {
      width: 200px;
      height: 120px;
      margin: 0 5px;
    }
  </style>
</head>
<body>

  <div class="background-pattern"></div>

  <div class="background-decor">
    <img src="foto/kado.png" alt="Decor" class="decor-item" data-url="kado1.html">
    <img src="foto/kado.png" alt="Decor" class="decor-item" data-url="kado2.html">
    <img src="foto/kado.png" alt="Decor" class="decor-item" data-url="a/index.html">
    <img src="foto/kado.png" alt="Decor" class="decor-item" data-url="kado3.html">
  </div>

  <div class="balloon-container">
    <div class="balloon" data-id="1">
      <img src="foto/balon1.png" alt="Balloon">
      <div class="balloon-text">Happy Birthday</div>
    </div>
    <div class="balloon" data-id="2">
      <img src="foto/balon1.png" alt="Balloon">
      <div class="balloon-text">Kue Ultah</div>
    </div>
    <div class="balloon" data-id="3">
      <img src="foto/balon1.png" alt="Balloon">
      <div class="balloon-text">Tau Apa Aja</div>
    </div>
    <div class="balloon" data-id="4">
      <img src="foto/balon1.png" alt="Balloon">
      <div class="balloon-text">Serba-serbi</div>
    </div>
  </div>

  <div class="card">
    <h1>Happy Birthday Zahra</h1>
    <div class="subtitle">Selamat Ulang Tahun Ke-20!</div>
    <div class="description">
      Semoga di hari istimewa ini, semua impianmu menjadi kenyataan. Semoga kebahagiaan selalu menyertaimu.
      <br><br>
      Dari<br>
      <strong>F</strong>
    </div>
    <div class="characters">
      <img src="foto/b1.png" alt="Character3">
    </div>
  </div>

  <audio id="popSound" src="https://www.soundjay.com/button/beep-07.wav" preload="auto"></audio>

  <script>
    const balloons = document.querySelectorAll('.balloon');
    const popSound = document.getElementById('popSound');
    const decorItems = document.querySelectorAll('.decor-item');

    balloons.forEach(balloon => {
      const img = balloon.querySelector('img');
      const balloonText = balloon.querySelector('.balloon-text');

      balloon.addEventListener('click', () => {
        balloon.style.transform = 'scale(1.8)';
        balloon.style.opacity = '0';
        popSound.play();

        setTimeout(() => {
          img.style.display = 'none';
          balloonText.classList.add('show');
          balloon.style.opacity = '1';
          balloon.style.transform = 'scale(1)';
        }, 300);
      });

      balloonText.addEventListener('click', () => {
        const textContent = balloonText.textContent.toLowerCase().replace(/\s/g, '');
        window.location.href = `${textContent}.html`;
      });
    });

    decorItems.forEach(item => {
      item.addEventListener('click', () => {
        const target = item.getAttribute('data-url');
        if (target) {
          window.location.href = target;
        }
      });
    });
  </script>

</body>
</html>
