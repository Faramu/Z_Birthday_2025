<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Selamat Ulang Tahun!</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #fff0f5, #ffe4e1);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-family: 'Comic Sans MS', cursive;
      overflow: hidden;
      position: relative;
    }

    .birthday-message {
      position: absolute;
      top: 10%;
      font-size: 2.5em;
      color: #d6336c;
      text-shadow: 2px 2px white;
      opacity: 0;
      transform: scale(0.5);
      transition: all 1s ease;
      z-index: 10;
    }

    .birthday-message.show {
      opacity: 1;
      transform: scale(1);
    }

    .cake {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 40px;
      z-index: 5;
    }

    /* Nampan */
    .tray {
      width: 250px;
      height: 40px;
      background: #d3d3d3;
      border-radius: 15px;
      position: absolute;
      bottom: -30px;
      box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
      z-index: -1;
    }

    .plate {
      width: 220px;
      height: 20px;
      background: #ccc;
      border-radius: 10px;
      margin-bottom: -10px;
    }

    .layer {
      height: 40px;
      border-radius: 8px;
      margin-bottom: 5px;
      position: relative;
      box-shadow: inset 0 -4px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .layer-top {
      width: 120px;
      background-color: #ffb6c1;
    }

    .layer-middle {
      width: 140px;
      background-color: #ffb6c1;
    }

    .layer-bottom {
      width: 160px;
      background-color: #ffb6c1;
    }

    .drip {
      position: absolute;
      top: 0;
      width: 100%;
      height: 15px;
      background: white;
      clip-path: polygon(0 0, 100% 0, 95% 100%, 5% 100%);
      border-radius: 0 0 8px 8px;
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding-top: 12px;
      z-index: 2;
    }

    .dots span {
      width: 10px;
      height: 10px;
      background: red;
      border-radius: 50%;
    }

    .candle {
      position: absolute;
      top: -50px;
      left: 50%;
      transform: translateX(-50%);
      width: 10px;
      height: 50px;
      background: #ffcc00;
      border-radius: 2px;
      box-shadow: inset 0 -3px #d4aa00;
      z-index: 5;
    }

    .flame {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      width: 12px;
      height: 18px;
      background: gold;
      border-radius: 50%;
      box-shadow: 0 0 15px gold;
      animation: flicker 0.3s infinite;
    }

    @keyframes flicker {
      0% { transform: translateX(-50%) scale(1); opacity: 1; }
      50% { transform: translateX(-50%) scale(1.2); opacity: 0.8; }
      100% { transform: translateX(-50%) scale(1); opacity: 1; }
    }

    button {
      margin-top: 30px;
      padding: 12px 25px;
      font-size: 18px;
      background-color: #ff69b4;
      border: none;
      color: white;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    button:hover {
      background-color: #e754a2;
      transform: scale(1.05);
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      background-color: hsl(calc(var(--i) * 36), 70%, 60%);
      top: -10px;
      left: calc(var(--i) * 10%);
      animation: fall 4s linear forwards;
      opacity: 0;
    }

    .confetti.show {
      opacity: 0.7;
    }

    @keyframes fall {
      0% { transform: translateY(0) rotate(0deg); }
      100% { transform: translateY(100vh) rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="birthday-message" id="message">🎉 Selamat Ulang Tahun! 🎂</div>

  <!-- Nampan -->
  <div class="tray"></div>

  <div class="cake">
    <!-- Lapisan atas -->
<div class="layer layer-top">
  <div class="drip"></div>
  <div class="candle">
    <div class="flame" id="flame"></div>
  </div>
  <div class="dots">
    <span></span><span></span><span></span>
  </div>
</div>

<!-- Lapisan tengah -->
<div class="layer layer-middle">
  <div class="drip"></div>
  <div class="dots">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
</div>

<!-- Lapisan bawah -->
<div class="layer layer-bottom">
  <div class="drip"></div>
  <div class="dots">
    <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
  </div>
</div>


  <div class="plate"></div>

  <button onclick="tiupLilin()">Tiup Lilin ✨</button>

<!-- Confetti -->
<script>
  let sudahTiup = false;

  function tiupLilin() {
    if (sudahTiup) return;
    sudahTiup = true;

    document.getElementById("flame").style.display = "none";
    document.getElementById("message").classList.add("show");

    for (let i = 0; i < 10; i++) {
      const confetti = document.createElement("div");
      confetti.className = "confetti";
      confetti.style.setProperty("--i", i);
      confetti.classList.add("show");

      document.body.appendChild(confetti);

      // Hapus confetti setelah animasi selesai
      confetti.addEventListener("animationend", () => {
        confetti.remove();
      });
    }
  }
</script>


</body>
</html>
