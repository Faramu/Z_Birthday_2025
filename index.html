<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zahra Birthday</title>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap');

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 0;
      background-image: url('foto/bghias.png'); /* Ganti dengan gambar latar belakang yang diinginkan */
      background-size: cover;
      background-position: center;
    }

    #envelope {
      position: relative;
      height: 240px;
      width: 340px;
      border-bottom-left-radius: 6px;
      border-bottom-right-radius: 6px;
      background-color: #6cbbff; /* Biru lebih terang */
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      z-index: 1;
    }

    #envelope:hover {
      cursor: pointer;
    }

    .front {
      position: absolute;
      width: 0;
      height: 0;
      z-index: 3;
    }

    .flap {
      border-top: 130px solid #6cbbff; /* Biru lebih terang */
      border-left: 170px solid transparent;
      border-right: 170px solid transparent;
      border-bottom: 82px solid transparent;
      transform-origin: top;
    }

    .pocket {
      border-left: 170px solid #4c8bff;
      border-right: 170px solid #4c8bff;
      border-bottom: 110px solid #80bfff;
      border-top: 110px solid transparent;
      border-bottom-left-radius: 6px;
      border-bottom-right-radius: 6px;
    }

    .letter {
      position: relative;
      background-color: white;
      width: 95%;
      height: 220px;
      top: 0;
      border-radius: 10px;
      box-shadow: 0 2px 26px rgba(0, 0, 0, .12);
      margin-left: auto;
      margin-right: auto;
      padding: 15px;
      box-sizing: border-box;
      z-index: 2;
    }

    .words {
      position: relative;
      width: 100%;
      font-size: 18px; /* Ukuran teks diperbesar */
      font-family: 'Dancing Script', cursive;
      color: black;
      line-height: 1.0;
      margin-bottom: 8px;
    }

    .line3, .line4 {
      text-align: center;
    }

    .open .flap {
      transform: rotatex(180deg);
      transition: transform 0.4s ease, z-index 0.6s;
      z-index: 1;
    }

    .close .flap {
      transform: rotatex(0deg);
      transition: transform 0.4s 0.6s ease, z-index 1s;
      z-index: 5;
    }

    .open .letter {
      transform: translatey(-160px);
      transition: transform 0.4s 0.6s ease, z-index 0.6s;
      z-index: 2;
    }

    .close .letter {
      transform: translatey(0deg);
      transition: transform 0.4s ease, z-index 1s;
      z-index: 1;
    }

    .hearts {
      position: absolute;
      top: 110px;
      left: 0;
      right: 0;
      z-index: 2;
    }

    .heart {
      position: absolute;
      bottom: 0;
      right: 10%;
    }

    .heart:before, .heart:after {
      position: absolute;
      content: "";
      background: #d00000;
      width: 50px;
      height: 80px;
      left: 50px;
      top: 0;
      border-radius: 50px 50px 0 0;
      transform: rotate(-45deg);
      transform-origin: 0 100%;
    }

    .heart:after {
      left: 0;
      transform: rotate(45deg);
      transform-origin: 100% 100%;
    }

    .close .heart {
      opacity: 0;
      animation: none;
    }

    .a1 { left: 20%; transform: scale(0.6); opacity: 1;
      animation: slideUp 4s linear 1, sideSway 2s ease-in-out 4 alternate;
      animation-fill-mode: forwards; animation-delay: 0.7s; }
    .a2 { left: 55%; transform: scale(1); opacity: 1;
      animation: slideUp 5s linear 1, sideSway 4s ease-in-out 2 alternate;
      animation-fill-mode: forwards; animation-delay: 0.7s; }
    .a3 { left: 10%; transform: scale(0.8); opacity: 1;
      animation: slideUp 7s linear 1, sideSway 2s ease-in-out 6 alternate;
      animation-fill-mode: forwards; animation-delay: 0.7s; }

    @keyframes slideUp { 0% { top: 0; } 100% { top: -600px; } }
    @keyframes sideSway { 0% { margin-left: 0px; } 100% { margin-left: 50px; } }

    .button-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
      z-index: 10;
    }

    .top-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .top-buttons button,
    .next-page-btn {
      font-weight: 800;
      background-color: transparent;
      border: solid 2px #4c8bff;
      border-radius: 4px;
      color: #4c8bff;
      font-size: 14px;
      text-transform: uppercase;
      padding: 10px 20px;
      text-decoration: none;
      min-width: 150px;
      outline: none;
      z-index: 10;
      transition: all 0.2s ease-in-out;
    }

    .top-buttons button:hover,
    .next-page-btn:hover {
      background-color: #4c8bff;
      cursor: pointer;
      color: white;
    }

    .next-page-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      background-color: transparent;
      border: solid 2px #4c8bff;
      border-radius: 4px;
      color: #4c8bff;
      font-size: 12px;
      text-transform: uppercase;
      padding: 8px 16px;
      min-width: 80px;
      height: 40px;
      text-decoration: none;
      outline: none;
      z-index: 10;
      transition: all 0.5s ease;
      opacity: 0;
      transform: translateY(20px);
      pointer-events: none;
    }

    .show-next .next-page-btn {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .valentine {
      text-align: center;
      font-family: 'Dancing Script', cursive;
      color: rgb(20, 20, 20);
      font-size: 40px;
      z-index: 5;
      margin-bottom: 30px;
      transition: all 0.5s ease;
    }

    .valentine.fade-out {
      opacity: 0;
      transform: translateY(-20px);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <h1 class="valentine" id="valentineText">Ikutin Instruksi Berikut:</h1>

  <div id="envelope" class="close">
    <div class="front flap"></div>
    <div class="front pocket"></div>
    <div class="letter">
      <p class="words line1">Halaman selanjutnya bakalan ada balon sama kado.</p>
      <p class="words line2">Balonnya bisa kamu klik 2 kali yang bakal pindahin kamu ke halaman lain.</p>
      <p class="words line3">Hal yang sama bisa kamu lakuin ke kadonya.</p>
      <p class="words line4">klik 🎁 buat pindah halaman</p>
    </div>
    <div class="hearts">
      <div class="heart a1"></div>
      <div class="heart a2"></div>
      <div class="heart a3"></div>
    </div>
  </div>

  <div class="button-container">
    <div class="top-buttons">
      <button id="open">Buka</button>
      <button id="reset">Tutup</button>
    </div>
    <a href="kartu.html" class="next-page-btn" id="nextPageBtn">🎁</a>
  </div>

  <script>
    $(document).ready(function () {
      const envelope = $("#envelope");
      const btn_open = $("#open");
      const btn_reset = $("#reset");
      const valentineText = $("#valentineText");

      function open() {
        envelope.addClass("open").removeClass("close");
        $("body").addClass("show-next");
        valentineText.addClass("fade-out");
      }

      function close() {
        envelope.addClass("close").removeClass("open");
        $("body").removeClass("show-next");
        valentineText.removeClass("fade-out");
      }

      envelope.click(() => open());
      btn_open.click(() => open());
      btn_reset.click(() => close());
    });
  </script>
</body>
</html>
